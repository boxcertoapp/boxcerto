    <!-- Google Tag Manager
         dataLayer inicializado imediatamente (mantém atribuição correta).
         O script do GTM é inserido no window.load para não bloquear LCP/TBT.
         GA4 e Google Ads são configurados PELO GTM — não há script direto aqui
         para evitar carregamento duplicado que causaria double-counting no GA4. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({'gtm.start': new Date().getTime(), event: 'gtm.js'});
      window.addEventListener('load', function() {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-55HMQMJQ';
        document.head.appendChild(s);
      });
    </script>
    <!-- End Google Tag Manager -->

    <!-- Schema.org JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "O BoxCerto funciona para qualquer tipo de oficina?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. O BoxCerto atende mecânicas gerais, funilarias, elétricas automotivas, oficinas de motos, martelinho de ouro, ar-condicionado veicular e muito mais. O sistema se adapta ao tipo de serviço da sua oficina."
          }
        },
        {
          "@type": "Question",
          "name": "Como funciona o orçamento por link no WhatsApp?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Você cria o orçamento no BoxCerto, gera um link e envia para o cliente pelo WhatsApp. O cliente abre o link no celular, vê os serviços e valores detalhados, e aprova com um clique. A aprovação fica registrada com data e hora, sem precisar de assinatura em papel."
          }
        },
        {
          "@type": "Question",
          "name": "Precisa instalar algum programa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. O BoxCerto funciona direto pelo navegador — computador, celular ou tablet. Não precisa instalar nada. Basta fazer o cadastro e começar a usar."
          }
        },
        {
          "@type": "Question",
          "name": "Tem período de teste gratuito?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. São 7 dias grátis, sem precisar cadastrar cartão de crédito. Você usa todas as funcionalidades durante o trial e só paga se decidir continuar."
          }
        },
        {
          "@type": "Question",
          "name": "Posso controlar o estoque de peças pelo BoxCerto?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. O módulo de estoque permite cadastrar peças, controlar entradas e saídas, definir quantidade mínima para alerta, e realizar vendas no balcão com emissão de recibo. Tudo integrado ao financeiro da oficina."
          }
        },
        {
          "@type": "Question",
          "name": "O sistema emite nota fiscal?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O BoxCerto não emite nota fiscal diretamente, mas registra todos os serviços, peças e valores de forma organizada, facilitando o trabalho com seu contador."
          }
        },
        {
          "@type": "Question",
          "name": "Quanto custa o BoxCerto?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O plano mensal custa R$97 por mês. Há também o plano anual com desconto. Os primeiros 7 dias são gratuitos, sem cartão de crédito."
          }
        }
      ]
    }
